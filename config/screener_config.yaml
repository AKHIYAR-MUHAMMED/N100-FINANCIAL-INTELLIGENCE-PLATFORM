# Screener Config YAML
# Defines thresholds for the 6 preset screeners and database column mappings.

metrics:
  roe:
    column: roe
    description: "Return on Equity (%)"
  debt_to_equity:
    column: debt_to_equity
    description: "Debt to Equity Ratio"
  free_cash_flow_cr:
    column: free_cash_flow_cr
    description: "Free Cash Flow (Cr)"
  revenue_cagr_5yr:
    column: revenue_cagr_5yr
    description: "Revenue CAGR 5Yr (%)"
  pat_cagr_5yr:
    column: pat_cagr_5yr
    description: "PAT CAGR 5Yr (%)"
  operating_profit_margin_pct:
    column: operating_profit_margin_pct
    description: "Operating Profit Margin (%)"
  pe_ratio:
    column: pe_ratio
    description: "Price to Earnings Ratio"
  pb_ratio:
    column: pb_ratio
    description: "Price to Book Ratio"
  dividend_yield:
    column: dividend_yield
    description: "Dividend Yield (%)"
  interest_coverage:
    column: interest_coverage
    description: "Interest Coverage Ratio"
  market_cap:
    column: market_cap
    description: "Market Capitalization (Cr)"
  net_profit:
    column: net_profit
    description: "Net Profit (Cr)"
  eps_cagr_5yr:
    column: eps_cagr_5yr
    description: "EPS CAGR 5Yr (%)"
  asset_turnover:
    column: asset_turnover
    description: "Asset Turnover"
  sales:
    column: sales
    description: "Sales (Cr)"

presets:
  quality_compounder:
    name: "Quality Compounder"
    description: "High ROE, low debt, positive cash flow, steady growth"
    filters:
      roe:
        min: 15.0
      debt_to_equity:
        max: 1.0
      free_cash_flow_cr:
        min: 0.0
      revenue_cagr_5yr:
        min: 10.0

  value_pick:
    name: "Value Pick"
    description: "Low valuation (PE/PB), reasonable debt, good dividend yield"
    filters:
      pe_ratio:
        max: 20.0
      pb_ratio:
        max: 3.0
      debt_to_equity:
        max: 2.0
      dividend_yield:
        min: 1.0

  growth_accelerator:
    name: "Growth Accelerator"
    description: "High sales and profit growth, manageable debt"
    filters:
      pat_cagr_5yr:
        min: 20.0
      revenue_cagr_5yr:
        min: 15.0
      debt_to_equity:
        max: 2.0

  dividend_champion:
    name: "Dividend Champion"
    description: "High dividend yield, sustainable payout, positive cash flow"
    filters:
      dividend_yield:
        min: 2.0
      dividend_payout_ratio_pct:
        max: 80.0
      free_cash_flow_cr:
        min: 0.0

  debt_free_blue_chip:
    name: "Debt-Free Blue Chip"
    description: "No debt, strong profitability, large scale sales"
    filters:
      debt_to_equity:
        max: 0.0
      roe:
        min: 12.0
      sales:
        min: 5000.0

  turnaround_watch:
    name: "Turnaround Watch"
    description: "Improving sales growth, positive latest FCF, declining D/E"
    filters:
      revenue_cagr_3yr:
        min: 10.0
      free_cash_flow_cr:
        min: 0.0
      de_declining: true
